title: "❓ Question: [Brief summary]"
labels:
  - help
body:
  - type: markdown
    attributes:
      value: |
        💡 Before posting, please attach your **diagnostics zip** — it helps us debug faster.
        In-app: **Settings → Diagnostics** exports the zip.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue in detail and attach your diagnostics zip if possible.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue — commands, steps, or context.
  - type: textarea
    id: version
    attributes:
      label: Sponge version and environment
      description: Include your Sponge version and operating system if known.
